<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Friday 图库管理</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <header class="toolbar">
        <div>
          <h1>Friday 图库管理</h1>
          <p id="status">正在连接 AstrBot...</p>
        </div>
        <button id="refresh" type="button">刷新</button>
      </header>

      <section class="stats" aria-label="图库统计">
        <div><strong id="stat-images">0</strong><span>图片</span></div>
        <div><strong id="stat-categories">0</strong><span>分类</span></div>
        <div><strong id="stat-sends">0</strong><span>发送</span></div>
        <div><strong id="stat-inbox">0</strong><span>待整理</span></div>
      </section>

      <section class="controls" aria-label="筛选和上传">
        <input id="search" type="search" placeholder="搜索标题、描述、标签、ID" />
        <select id="category"></select>
        <select id="safety-status">
          <option value="">全部状态</option>
          <option value="normal">正常</option>
          <option value="sensitive">敏感</option>
          <option value="hidden">隐藏</option>
        </select>
        <button id="filter-inbox" type="button">待整理</button>
        <form id="upload-form" class="upload">
          <input id="upload-category" type="text" placeholder="上传分类，留空进待整理" />
          <label id="drop-zone" class="drop-zone" for="upload-file">
            <input id="upload-file" type="file" accept="image/jpeg,image/png,image/gif,image/webp" multiple />
            <span>拖拽图片到这里，或点击选择</span>
          </label>
          <button type="submit">上传</button>
        </form>
      </section>

      <section id="bulk-bar" class="bulk-bar" hidden>
        <strong id="selected-count">0</strong>
        <span>已选择</span>
        <select id="bulk-safety-status">
          <option value="">敏感状态</option>
          <option value="normal">正常</option>
          <option value="sensitive">敏感</option>
          <option value="hidden">隐藏</option>
        </select>
        <select id="bulk-send-transform">
          <option value="">发送变换</option>
          <option value="none">不变换</option>
          <option value="rotate_180">旋转 180 度</option>
        </select>
        <input id="bulk-category" type="text" placeholder="移动到分类" />
        <button id="bulk-move" type="button">移动</button>
        <input id="bulk-tags" type="text" placeholder="标签" />
        <select id="bulk-tag-operation">
          <option value="add">添加标签</option>
          <option value="remove">移除标签</option>
          <option value="set">替换标签</option>
        </select>
        <button id="bulk-tags-apply" type="button">标签</button>
        <button id="bulk-apply" type="button">应用</button>
        <button id="bulk-delete" type="button" class="danger">删除</button>
        <button id="bulk-clear" type="button">取消选择</button>
      </section>

      <section class="category-tools" aria-label="分类管理">
        <div>
          <h2>分类管理</h2>
          <p>分类设置只管理图库内容；插件配置在 AstrBot 插件配置里调整。</p>
        </div>
        <form id="category-create-form" class="inline-form">
          <input id="category-create-name" type="text" placeholder="新分类名称" />
          <button type="submit">新建</button>
        </form>
        <form id="category-rename-form" class="inline-form">
          <select id="category-rename-source"></select>
          <input id="category-rename-name" type="text" placeholder="新显示名" />
          <button type="submit">重命名</button>
        </form>
        <form id="category-merge-form" class="inline-form">
          <select id="category-merge-source"></select>
          <select id="category-merge-target"></select>
          <button type="submit">合并</button>
        </form>
      </section>

      <section id="grid" class="grid" aria-label="图片列表"></section>
      <div id="sentinel" class="sentinel" aria-hidden="true"></div>

      <dialog id="editor">
        <form method="dialog" class="editor">
          <header>
            <h2>编辑图片信息</h2>
            <button id="close-editor" type="button" aria-label="关闭">×</button>
          </header>
          <input id="edit-id" type="hidden" />
          <label>
            标题
            <input id="edit-title" type="text" maxlength="120" />
          </label>
          <label>
            描述
            <textarea id="edit-description" rows="5" maxlength="1000"></textarea>
          </label>
          <label>
            标签
            <input id="edit-tags" type="text" placeholder="用空格或逗号分隔" />
          </label>
          <div class="row">
            <label>
              评分
              <select id="edit-rating">
                <option value="">未评分</option>
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
              </select>
            </label>
            <label>
              敏感状态
              <select id="edit-safety-status">
                <option value="normal">正常</option>
                <option value="sensitive">敏感</option>
                <option value="hidden">隐藏</option>
              </select>
            </label>
            <label>
              发送变换
              <select id="edit-send-transform">
                <option value="none">不变换</option>
                <option value="rotate_180">旋转 180 度</option>
              </select>
            </label>
          </div>
          <footer>
            <button id="save-editor" type="button">保存</button>
          </footer>
        </form>
      </dialog>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
