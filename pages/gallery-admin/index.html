<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Friday 图库管理</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="shell">
      <header class="toolbar">
        <div>
          <h1>Friday 图库管理</h1>
          <p id="status">正在连接 AstrBot...</p>
        </div>
        <button id="refresh" type="button">刷新</button>
      </header>

      <section class="stats" aria-label="图库统计">
        <div><strong id="stat-images">0</strong><span>图片</span></div>
        <div><strong id="stat-categories">0</strong><span>分类</span></div>
        <div><strong id="stat-sends">0</strong><span>发送</span></div>
        <div><strong id="stat-latest">-</strong><span>最近上传</span></div>
      </section>

      <section class="controls">
        <input id="search" type="search" placeholder="搜索标题、描述、标签、ID" />
        <select id="category"></select>
        <select id="safety-status">
          <option value="">全部状态</option>
          <option value="normal">正常</option>
          <option value="sensitive">敏感</option>
          <option value="hidden">隐藏</option>
        </select>
        <form id="upload-form" class="upload">
          <input id="upload-category" type="text" placeholder="上传分类" />
          <input id="upload-file" type="file" accept="image/jpeg,image/png,image/gif,image/webp" />
          <button type="submit">上传</button>
        </form>
      </section>

      <section id="grid" class="grid" aria-label="图片列表"></section>

      <dialog id="editor">
        <form method="dialog" class="editor">
          <header>
            <h2>编辑图片信息</h2>
            <button id="close-editor" type="button" aria-label="关闭">×</button>
          </header>
          <input id="edit-id" type="hidden" />
          <label>
            标题
            <input id="edit-title" type="text" maxlength="120" />
          </label>
          <label>
            描述
            <textarea id="edit-description" rows="5" maxlength="1000"></textarea>
          </label>
          <label>
            标签
            <input id="edit-tags" type="text" placeholder="用空格或逗号分隔" />
          </label>
          <div class="row">
            <label>
              评分
              <select id="edit-rating">
                <option value="">未评分</option>
                <option value="0">0</option>
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
              </select>
            </label>
            <label>
              敏感状态
              <select id="edit-safety-status">
                <option value="normal">正常</option>
                <option value="sensitive">敏感</option>
                <option value="hidden">隐藏</option>
              </select>
            </label>
            <label>
              发送变换
              <select id="edit-send-transform">
                <option value="none">不变换</option>
                <option value="rotate_180">旋转 180 度</option>
              </select>
            </label>
          </div>
          <footer>
            <button id="save-editor" type="button">保存</button>
          </footer>
        </form>
      </dialog>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
